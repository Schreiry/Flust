[build]
# target-cpu=native: compiler enables all instructions available on the current CPU.
# We do NOT rely on this alone for runtime detection —
# we need is_x86_feature_detected! for binary compatibility across machines.
#
# AVX2+FMA: explicit feature flags ensure LLVM autovectorizer emits FMA instructions.
# llvm-args=-unroll-count=4: helps inner j-loop in matmul achieve better IPC.
rustflags = [
    "-C", "target-cpu=native",
    "-C", "target-feature=+avx2,+fma,+bmi1,+bmi2,+popcnt",
    "-C", "llvm-args=-unroll-count=4",
]
